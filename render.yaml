databases:
  - name: library-db
    databaseName: library_system
    user: library_user
    plan: free

services:
  # Backend Service
  - type: web
    name: library-backend
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn librarySystemBackend.wsgi:application
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: library-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost"
      - key: FRONTEND_URL
        fromStaticSite:
          name: library-frontend
          property: url

  # Frontend Service
  - type: static
    name: library-frontend
    runtime: node
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: library-backend
          type: web
          property: url

  # Automated Expiration Cron Job
  - type: cron
    name: expire-reservations-cron
    runtime: python
    schedule: "*/5 * * * *" # Every 5 minutes
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py expire_reservations
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: library-db
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: library-backend
          type: web
          property: SECRET_KEY
      - key: DEBUG
        value: "False"
